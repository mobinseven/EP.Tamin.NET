name: CI

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:
    branches: ["**"]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore EP.Tamin.NET.slnx

      - name: Build
        run: dotnet build EP.Tamin.NET.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test EP.Tamin.NET.slnx --no-build --configuration Release --verbosity normal
