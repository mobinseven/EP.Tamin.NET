name: NuGet Push

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    name: Pack & Push to NuGet
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore EP.Tamin.NET.slnx

      - name: Build
        run: dotnet build EP.Tamin.NET.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test EP.Tamin.NET.slnx --no-build --configuration Release --verbosity normal

      - name: Compute package version
        shell: bash
        run: |
          set -euo pipefail

          version_prefix="$(dotnet msbuild src/EP.Tamin.NET/EP.Tamin.NET.csproj -getProperty:VersionPrefix)"
          if [[ -z "${version_prefix}" ]]; then
            echo "VersionPrefix is empty. Set VersionPrefix in Directory.Build.props." >&2
            exit 1
          fi

          package_version="${version_prefix}.${GITHUB_RUN_NUMBER}"
          echo "PACKAGE_VERSION=${package_version}" >> "${GITHUB_ENV}"
          echo "NuGet package version: ${package_version}"

      - name: Pack
        run: >
          dotnet pack src/EP.Tamin.NET/EP.Tamin.NET.csproj
          --no-build
          --configuration Release
          --output ./nupkg
          -p:PackageVersion=${PACKAGE_VERSION}
          -p:Version=${PACKAGE_VERSION}

      - name: Push to NuGet.org
        run: >
          dotnet nuget push ./nupkg/*.nupkg
          --api-key ${{ secrets.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
